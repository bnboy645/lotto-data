name: Update Lotto Data

on:
  schedule:
    # Every Saturday at 12:30 UTC (= 21:30 KST, 45 min after draw)
    - cron: '30 12 * * 6'
    # Retry: Saturday 14:00 UTC (= 23:00 KST) in case first attempt missed
    - cron: '0 14 * * 6'
    # Retry: Sunday 00:00 UTC (= 09:00 KST next day)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest draws
        run: python scripts/fetch_lotto.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lotto_draws.csv
          git diff --staged --quiet || git commit -m "Update lotto data $(date -u +%Y-%m-%d)"
          git push
